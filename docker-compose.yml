services:
  db2_federated:
    image: ibmcom/db2:11.5.8.0
    container_name: db2_federated
    ports:
      - "50000:50000"
    environment:
      DB2INST1_PASSWORD: "db2inst1"
      LICENSE: "accept"
      DBNAME: "BASETASD"
      DB2_WORKLOAD: "tasdlab"
    volumes:
      - ./db2_federated_data:/database
      - ./scripts:/scripts:ro
      - ./data:/var/db2/files:ro
    networks:
      - db2_network
    healthcheck:
      test: [ "CMD", "db2", "connect", "to", "BASETASD" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db2_remote:
    image: ibmcom/db2:11.5.8.0
    container_name: db2_remote
    ports:
      - "50001:50000"
    environment:
      DB2INST1_PASSWORD: "db2inst1"
      LICENSE: "accept"
      DBNAME: "SAMPLE"
      SAMPLEDATABASE: "true"
      DB2_WORKLOAD: "tasdlab"
    volumes:
      - ./db2_remote_data:/database
      - ./scripts:/scripts:ro
      - ./data:/var/db2/files:ro
    networks:
      - db2_network
    healthcheck:
      test: [ "CMD", "db2", "connect", "to", "SAMPLE" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  db2_network:
    driver: bridge
